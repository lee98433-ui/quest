<nav class="main-header">
  <div class="logo" routerLink="/dynamic-survey/src/app/@page/front-list" style="cursor: pointer;">綜合問券System</div>

  <div class="user-zone">
    <ng-container *ngIf="!(authService.currentUser$ | async); else userLoggedIn">
      <button class="btn-login" (click)="showModal = true">會員登入</button>
    </ng-container>

    <ng-template #userLoggedIn>
      <span class="welcome">你好, {{ (authService.currentUser$ | async)?.name }}</span>
      <button class="btn-logout" (click)="logout()">登出</button>
    </ng-template>
  </div>
</nav>

<div class="login-modal" *ngIf="showModal">
  <div class="modal-content">
    <h3>系統登入</h3>
    <div class="form-group">
      <label>帳號：</label>
      <input type="text" [(ngModel)]="loginUser">
    </div>
    <div class="form-group">
      <label>密碼：</label>
      <input type="password" [(ngModel)]="loginPwd">
    </div>
    <div class="modal-actions">
      <button (click)="onLogin()">確認登入</button>
      <button class="btn-cancel" (click)="showModal = false">取消</button>
    </div>
  </div>
</div>

<main class="content-area">
  <router-outlet></router-outlet>
